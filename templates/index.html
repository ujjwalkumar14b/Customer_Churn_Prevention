<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Customer Churn Prediction</h2>

    <form action="/predict" method="post" class="row g-3">

        <div class="col-md-3">
            <label>Gender</label><br>
            <input type="radio" name="gender" value="Male" checked> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>
        <div class="col-md-3">
            <label>Senior Citizen</label><br>
            <input type="radio" name="SeniorCitizen" value="1"> Yes
            <input type="radio" name="SeniorCitizen" value="0" checked> No
        </div>

        {% for field in ['Partner','Dependents','PhoneService','MultipleLines','OnlineSecurity','OnlineBackup','DeviceProtection','TechSupport','StreamingTV','StreamingMovies','PaperlessBilling'] %}
        <div class="col-md-3">
            <label>{{ field }}</label><br>
            <input type="radio" name="{{field}}" value="Yes"> Yes
            <input type="radio" name="{{field}}" value="No" checked> No
        </div>
        {% endfor %}

        <div class="col-md-3">
            <label>Internet Service</label>
            <select name="InternetService" class="form-control">
                <option>DSL</option>
                <option>Fiber optic</option>
                <option>No</option>
            </select>
        </div>
        <div class="col-md-3">
            <label>Contract</label>
            <select name="Contract" class="form-control">
                <option>Month-to-month</option>
                <option>One year</option>
                <option>Two year</option>
            </select>
        </div>
        <div class="col-md-3">
            <label>Payment Method</label>
            <select name="PaymentMethod" class="form-control">
                <option>Electronic check</option>
                <option>Mailed check</option>
                <option>Bank transfer (automatic)</option>
                <option>Credit card (automatic)</option>
            </select>
        </div>
        <div class="col-md-3">
            <label>Tenure (Min: 0 & Max: 72)</label>
            <input type="number" name="tenure" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Monthly Charges (Min: 18.25 & Max: 118.75)</label>
            <input type="number" step="0.01" name="MonthlyCharges" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Total Charges (Min: 18.8 & Max: 8684.8)</label>
            <input type="number" step="0.01" name="TotalCharges" class="form-control" required>
        </div>

        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary">Predict</button>
        </div>
    </form>

    <div class="mt-4 text-center">
        <h4>{{ prediction_text }}</h4>
    </div>
</div>
</body>
</html>
